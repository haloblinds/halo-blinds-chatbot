<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Halo Chatbot — Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f7f7f7;color:#111}
  .wrap{max-width:1200px;margin:0 auto;padding:24px}
  header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid #eaeaea;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  h1{margin:0;font-size:22px;letter-spacing:-.01em}
  .header-right{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .tabs{display:flex;gap:4px;background:#eee;padding:4px;border-radius:10px}
  .tab{background:transparent;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#555}
  .tab.active{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .export-btn{display:flex;align-items:center;gap:6px;background:#111;color:#fff;border:none;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s ease}
  .export-btn:hover{opacity:.85}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:16px}
  .stat .num{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .stat .label{font-size:12px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:.03em}

  .grid{display:grid;grid-template-columns:360px 1fr;gap:16px;min-height:60vh}
  .list,.detail{background:#fff;border:1px solid #eaeaea;border-radius:12px;overflow:hidden}
  .list{max-height:75vh;overflow-y:auto}
  .conv{padding:14px 16px;border-bottom:1px solid #f2f2f2;cursor:pointer;transition:background .1s ease}
  .conv:hover{background:#fafafa}
  .conv.active{background:#f0f0f0}
  .conv .who{font-size:13px;color:#111;font-weight:600;margin-bottom:2px}
  .conv .preview{font-size:12px;color:#666;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .conv .meta{font-size:11px;color:#999;margin-top:6px;display:flex;justify-content:space-between}

  .detail{padding:0;display:flex;flex-direction:column;max-height:75vh}
  .detail-head{padding:14px 18px;border-bottom:1px solid #eaeaea;background:#fafafa}
  .detail-head .title{font-weight:600;font-size:14px;margin-bottom:4px}
  .detail-head .sub{font-size:12px;color:#666}
  .detail-body{padding:18px;overflow-y:auto;flex:1}
  .msg{padding:10px 14px;border-radius:12px;margin-bottom:10px;font-size:14px;line-height:1.5;max-width:80%;white-space:pre-wrap;word-wrap:break-word}
  .msg.user{background:#111;color:#fff;margin-left:auto;border-bottom-right-radius:4px}
  .msg.assistant{background:#f0f0f0;color:#111;margin-right:auto;border-bottom-left-radius:4px}
  .msg .ts{font-size:10px;opacity:.5;margin-top:4px;display:block}

  .empty{padding:60px 24px;text-align:center;color:#888;font-size:14px}
  .loading{padding:40px;text-align:center;color:#888}

  .questions-list{background:#fff;border:1px solid #eaeaea;border-radius:12px;overflow:hidden}
  .q-row{padding:12px 16px;border-bottom:1px solid #f4f4f4;display:flex;gap:12px;align-items:baseline}
  .q-row .q-text{flex:1;font-size:14px;color:#111}
  .q-row .q-time{font-size:11px;color:#999;flex-shrink:0}

  @media (max-width:800px){
    .grid{grid-template-columns:1fr}
    .stat-row{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Halo Chatbot — Dashboard</h1>
    <div class="header-right">
      <div class="tabs">
        <button class="tab active" data-view="conversations">Conversations</button>
        <button class="tab" data-view="questions">Top questions</button>
      </div>
      <button class="export-btn" id="export-btn" title="Download current view as CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <div class="stat-row" id="stats"></div>

  <div id="view-conversations">
    <div class="grid">
      <div class="list" id="conv-list"><div class="loading">Loading…</div></div>
      <div class="detail" id="conv-detail"><div class="empty">Select a conversation to view messages.</div></div>
    </div>
  </div>

  <div id="view-questions" style="display:none">
    <div class="questions-list" id="questions-list"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
let conversations = [];
let currentId = null;

function fmtTime(ts){
  if(!ts) return '';
  const d = new Date(Number(ts));
  const now = new Date();
  const diff = now - d;
  if(diff < 60000) return 'just now';
  if(diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if(diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadConversations(){
  const res = await fetch('/api/conversations?action=list');
  if(!res.ok){
    document.getElementById('conv-list').innerHTML = '<div class="empty">Failed to load. Are you signed in?</div>';
    return;
  }
  const data = await res.json();
  conversations = data.conversations || [];
  renderStats();
  renderList();
}

function renderStats(){
  const totalConvs = conversations.length;
  const totalMsgs = conversations.reduce((s,c) => s + (c.message_count||0), 0);
  const userMsgs = conversations.reduce((s,c) => s + (c.messages||[]).filter(m => m.role==='user').length, 0);
  const avgLen = totalConvs ? Math.round(totalMsgs/totalConvs*10)/10 : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${totalConvs}</div><div class="label">Conversations</div></div>
    <div class="stat"><div class="num">${userMsgs}</div><div class="label">Questions asked</div></div>
    <div class="stat"><div class="num">${totalMsgs}</div><div class="label">Total messages</div></div>
    <div class="stat"><div class="num">${avgLen}</div><div class="label">Avg messages/conv</div></div>
  `;
}

function renderList(){
  const list = document.getElementById('conv-list');
  if(conversations.length === 0){
    list.innerHTML = '<div class="empty">No conversations yet.</div>';
    return;
  }
  list.innerHTML = conversations.map(c => {
    const firstUser = (c.messages || []).find(m => m.role === 'user');
    const preview = firstUser ? firstUser.content : '(no user message)';
    return `
      <div class="conv ${c.id === currentId ? 'active' : ''}" data-id="${escapeHtml(c.id)}">
        <div class="who">${escapeHtml(c.product_title || 'Halo Blinds')}</div>
        <div class="preview">${escapeHtml(preview)}</div>
        <div class="meta"><span>${c.message_count} msgs</span><span>${fmtTime(c.updated_at)}</span></div>
      </div>`;
  }).join('');
  list.querySelectorAll('.conv').forEach(el => {
    el.addEventListener('click', () => selectConv(el.dataset.id));
  });
}

function selectConv(id){
  currentId = id;
  renderList();
  const c = conversations.find(x => x.id === id);
  if(!c){ return; }
  const msgs = (c.messages || []).map(m => `
    <div class="msg ${m.role}">${escapeHtml(m.content)}
      <span class="ts">${fmtTime(m.at)}</span>
    </div>`).join('');
  document.getElementById('conv-detail').innerHTML = `
    <div class="detail-head">
      <div class="title">${escapeHtml(c.product_title || 'Halo Blinds')}</div>
      <div class="sub">${escapeHtml(c.product_url || '')} · ${fmtTime(c.updated_at)}</div>
    </div>
    <div class="detail-body">${msgs || '<div class="empty">No messages.</div>'}</div>
  `;
}

async function loadQuestions(){
  const res = await fetch('/api/conversations?action=questions&limit=200');
  if(!res.ok){
    document.getElementById('questions-list').innerHTML = '<div class="empty">Failed to load.</div>';
    return;
  }
  const data = await res.json();
  const rows = (data.questions || []).map(q => `
    <div class="q-row">
      <div class="q-text">${escapeHtml(q.q)}</div>
      <div class="q-time">${fmtTime(q.at)}</div>
    </div>
  `).join('');
  document.getElementById('questions-list').innerHTML = rows || '<div class="empty">No questions yet.</div>';
}

let activeView = 'conversations';
let questionsCache = [];

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeView = tab.dataset.view;
    document.getElementById('view-conversations').style.display = activeView === 'conversations' ? 'block' : 'none';
    document.getElementById('view-questions').style.display = activeView === 'questions' ? 'block' : 'none';
    if(activeView === 'questions') loadQuestions();
  });
});

function csvEscape(v){
  if(v === null || v === undefined) return '';
  const s = String(v).replace(/"/g, '""');
  return /[",\n\r]/.test(s) ? `"${s}"` : s;
}

function downloadCsv(filename, rows){
  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('export-btn').addEventListener('click', async () => {
  const stamp = new Date().toISOString().slice(0, 10);
  if(activeView === 'conversations'){
    const rows = [['conversation_id','timestamp','role','message','product_title','product_url']];
    conversations.forEach(c => {
      (c.messages || []).forEach(m => {
        rows.push([
          c.id,
          m.at ? new Date(Number(m.at)).toISOString() : '',
          m.role,
          m.content,
          c.product_title || '',
          c.product_url || ''
        ]);
      });
    });
    downloadCsv(`halo-conversations-${stamp}.csv`, rows);
  } else {
    if(questionsCache.length === 0) await loadQuestions();
    const rows = [['timestamp','question','conversation_id']];
    questionsCache.forEach(q => {
      rows.push([
        q.at ? new Date(Number(q.at)).toISOString() : '',
        q.q,
        q.conversation_id || ''
      ]);
    });
    downloadCsv(`halo-questions-${stamp}.csv`, rows);
  }
});

// Wrap loadQuestions to cache for export
const _loadQuestions = loadQuestions;
loadQuestions = async function(){
  const res = await fetch('/api/conversations?action=questions&limit=200');
  if(!res.ok){
    document.getElementById('questions-list').innerHTML = '<div class="empty">Failed to load.</div>';
    return;
  }
  const data = await res.json();
  questionsCache = data.questions || [];
  const rows = questionsCache.map(q => `
    <div class="q-row">
      <div class="q-text">${escapeHtml(q.q)}</div>
      <div class="q-time">${fmtTime(q.at)}</div>
    </div>
  `).join('');
  document.getElementById('questions-list').innerHTML = rows || '<div class="empty">No questions yet.</div>';
};

loadConversations();
</script>
</body>
</html>
